<!DOCTYPE html>
<html>
<head>
    <title>Available Positions</title>
</head>
<body>

<h1>Available Positions in Kuwait</h1>

<p>Select a position to view details and apply:</p>

<ul id="open-positions">
    <li>Loading...</li>
</ul>

<h1>Closed Positions</h1>

<p>The following positions have been closed, however you can still submit your CV for future similar positions:</p>

<ul id="closed-positions">
</ul>

<script>
fetch("positions.json")
.then(response => response.json())
.then(positions => {

    const openList = document.getElementById("open-positions");
    const closedList = document.getElementById("closed-positions");

    openList.innerHTML = "";
    closedList.innerHTML = "";

    positions.forEach(job => {

        const li = document.createElement("li");
        const a = document.createElement("a");

        a.href = `job.html?id=${job.id}`;
        a.textContent = job.title;

        li.appendChild(a);

        if(job.active)
            openList.appendChild(li);
        else
            closedList.appendChild(li);

    });

});
</script>

</body>
</html>
